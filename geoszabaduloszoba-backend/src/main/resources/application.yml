spring:
  application:
    name: geoszabaduloszoba-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/cityscape_db
    username: postgres
    password: geolokaciosadmin

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      encoding: UTF-8

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/cityscape-realm
